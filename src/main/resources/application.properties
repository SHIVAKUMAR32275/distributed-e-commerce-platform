spring.application.name=distributed-e-commerence-platform

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ECommerence_Platform
spring.datasource.username=YOUR_NAME
spring.datasource.password=YOUR_PASSWORD

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update

# SQL Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8080

jwt.secret=YOUR_JWT_SECRET
#
#server.error.include-stacktrace=never
#server.error.include-message=always

# the above 2 are used to make the postman output could be clear for handling the exceptions